<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Sản phẩm</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 20px;
      }

      h1 {
        margin-bottom: 8px;
      }

      #form-section {
        margin-bottom: 16px;
      }

      #form-section label {
        display: inline-block;
        margin-right: 8px;
      }

      input[type="number"] {
        width: 120px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 8px;
        border: 1px solid #ddd;
        text-align: left;
      }

      th {
        background: #f3f3f3;
      }

      #th-name {
        cursor: pointer;
        user-select: none;
      }

      tbody tr:nth-child(even) {
        background: #f9f9f9;
      }

      tbody tr:hover {
        background: #eef;
      }

      .sort-arrow {
        margin-left: 6px;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <h1>Quản lý Sản phẩm</h1>

    <section id="form-section">
      <h2>Thêm sản phẩm</h2>
      <div>
        <label>Tên: <input id="input-name" type="text" /></label>
        <label>Danh mục: <input id="input-category" type="text" /></label>
        <label
          >Đơn giá: <input id="input-price" type="number" min="0" step="0.01"
        /></label>
        <label
          >Số lượng: <input id="input-quantity" type="number" min="1" step="1"
        /></label>
        <button id="btn-add">Thêm</button>
      </div>
    </section>

    <section id="table-section">
      <table id="product-table">
        <thead>
          <tr>
            <th>STT</th>
            <th id="th-name">Tên sản phẩm <span class="sort-arrow"></span></th>
            <th>Danh mục</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <script>
      (function () {
        const tbody = document.querySelector("#product-table tbody");
        const thName = document.getElementById("th-name");
        const arrow = (thName && thName.querySelector(".sort-arrow")) || {
          textContent: "",
        };
        const inputName = document.getElementById("input-name");
        const inputCategory = document.getElementById("input-category");
        const inputPrice = document.getElementById("input-price");
        const inputQuantity = document.getElementById("input-quantity");
        const btnAdd = document.getElementById("btn-add");

        let products = [];
        let nameSortAsc = null;

        function renderTable() {
          if (!tbody) return;
          tbody.innerHTML = "";
          const display = products.slice();

          if (nameSortAsc !== null) {
            display.sort(function (a, b) {
              const na = (a.name || "").toString().toLowerCase();
              const nb = (b.name || "").toString().toLowerCase();
              if (na < nb) return nameSortAsc ? -1 : 1;
              if (na > nb) return nameSortAsc ? 1 : -1;
              return 0;
            });
          }

          display.forEach(function (p, i) {
            const tr = document.createElement("tr");
            const tdStt = document.createElement("td");
            tdStt.textContent = i + 1;
            const tdName = document.createElement("td");
            tdName.textContent = p.name || "";
            const tdCat = document.createElement("td");
            tdCat.textContent = p.category || "";
            const tdPrice = document.createElement("td");
            tdPrice.textContent = p.price;
            const tdQty = document.createElement("td");
            tdQty.textContent = p.quantity;
            tr.appendChild(tdStt);
            tr.appendChild(tdName);
            tr.appendChild(tdCat);
            tr.appendChild(tdPrice);
            tr.appendChild(tdQty);
            tbody.appendChild(tr);
          });

          updateArrow();
        }

        function updateArrow() {
          if (!arrow) return;
          arrow.textContent =
            nameSortAsc === null ? "" : nameSortAsc ? "▲" : "▼";
        }

        if (thName) {
          thName.addEventListener("click", function () {
            nameSortAsc = nameSortAsc === null ? true : !nameSortAsc;
            renderTable();
          });
        }

        if (btnAdd) {
          btnAdd.addEventListener("click", function (e) {
            e.preventDefault();
            const name = ((inputName && inputName.value) || "").trim();
            const category = (
              (inputCategory && inputCategory.value) ||
              ""
            ).trim();
            const price = Number(inputPrice && inputPrice.value);
            const quantity = Number(inputQuantity && inputQuantity.value);

            if (!name || name.length < 3) {
              alert("Tên sản phẩm phải có ít nhất 3 ký tự");
              return;
            }
            if (!isFinite(price) || price <= 0) {
              alert("Đơn giá phải là số dương");
              return;
            }
            if (!Number.isInteger(quantity) || quantity < 1) {
              alert("Số lượng phải là số nguyên dương");
              return;
            }

            const newId = products.length
              ? Math.max.apply(
                  null,
                  products.map(function (p) {
                    return p.id || 0;
                  }),
                ) + 1
              : 1;
            const newProduct = {
              id: newId,
              name: name,
              category: category,
              price: price,
              quantity: quantity,
            };
            products.push(newProduct);
            renderTable();
            if (inputName) inputName.value = "";
            if (inputCategory) inputCategory.value = "";
            if (inputPrice) inputPrice.value = "";
            if (inputQuantity) inputQuantity.value = "";
            if (inputName && typeof inputName.focus === "function")
              inputName.focus();
          });
        }

        const xhr = new XMLHttpRequest();
        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4 && xhr.status === 200) {
            try {
              const data = JSON.parse(xhr.responseText);
              if (Array.isArray(data)) {
                products = data;
                renderTable();
              }
            } catch (err) {
              console.error("Invalid products.json", err);
            }
          }
        };
        xhr.open("GET", "products.json");
        xhr.send();
      })();
    </script>
  </body>
</html>
